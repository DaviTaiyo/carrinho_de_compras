<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja tribusfus</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Loja tribusfus</h1>
        <button onclick="mostrarCarrinho()">Ver Carrinho</button>
    </header>

    <main>
        <section id="area-produtos">
            <h2>Produtos</h2>
            <div id="lista-produtos" class="grid-produtos">
            </div>
        </section>

        <section id="area-carrinho" class="oculto">
            <h2>Carrinho de compras</h2>
            <div id="lista-carrinho"></div>

            <h3 id="total">Total: R$ 0,00</h3>

            <button onclick="finalizarCompra()"
            class="btn-finalizar">Finalizar Compra</button>

            <button onclick="mostrarProdutos()" 
            class="btn-voltar">Voltar para Produtos</button>
        </section>
    </main>
    
    <script src="script.js"></script>
</body>
</html>
